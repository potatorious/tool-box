<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>신발 사이즈 비교 표</title>
    <link rel="stylesheet" href="../../styles.css">
    <script defer src="../../site.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-brand" href="../../">🥔⚡Potatospark</a>
        <span class="site-clock" data-site-clock aria-label="현재 날짜와 시간"></span>
      </div>
    </header>

    <main class="site-main tool">
      <h1>신발 사이즈 비교 표</h1>

      <section class="form-grid shoe-size-inputs" aria-label="신발 사이즈 입력">
        <label>
          기준
          <select id="source-unit">
            <option value="kr">KR (mm)</option>
            <option value="usMen">US 남성</option>
            <option value="usWomen">US 여성</option>
            <option value="uk">UK</option>
            <option value="eu">EU</option>
            <option value="jp">JP</option>
            <option value="footIn">발 길이 (in)</option>
          </select>
        </label>

        <label>
          사이즈
          <select id="source-size"></select>
        </label>
      </section>

      <section class="size-results" aria-label="변환 결과">
        <div class="table-wrap size-table-wrap" id="size-table-wrap">
          <table>
            <caption class="visually-hidden">
              KR, US 남성, US 여성, UK, EU, JP, 발 길이 인치 기준 신발 사이즈 비교표
            </caption>
            <thead>
              <tr>
                <th>KR (mm)</th>
                <th>US 남성</th>
                <th>US 여성</th>
                <th>UK</th>
                <th>EU</th>
                <th>JP</th>
                <th>발 길이 (in)</th>
              </tr>
            </thead>
            <tbody id="result-rows"></tbody>
          </table>
        </div>
      </section>

      <p class="note-text">
        Mondopoint 발 길이 기준 비교표입니다.<br>
        EU, UK, US 값은 0.5 단위 반올림값입니다.<br>
        브랜드와 제품의 실측, 라스트, 핏에 따라 권장 사이즈는 달라질 수 있습니다.
      </p>
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <nav aria-label="사이트 정보">
          <a href="../../about/">소개</a>
          <span aria-hidden="true">|</span>
          <a href="../../privacy/">개인정보처리방침</a>
          <span aria-hidden="true">|</span>
          <a href="../../terms/">이용약관</a>
          <span aria-hidden="true">|</span>
          <a href="../../contact/">문의</a>
        </nav>
        <span>© 2026 PotatoSpark. All rights reserved.</span>
      </div>
    </footer>
  </body>
</html>
