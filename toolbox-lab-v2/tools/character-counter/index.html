<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>글자수 계산기</title>
    <link rel="stylesheet" href="../../styles.css">
    <script defer src="../../site.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-brand" href="../../">🥔⚡Potatospark</a>
        <span class="site-clock" data-site-clock aria-label="현재 날짜와 시간"></span>
      </div>
    </header>

    <main class="site-main tool">
      <h1>글자수 계산기</h1>

      <textarea id="text-input" class="text-input" placeholder="여기에 텍스트를 입력하세요."></textarea>

      <section class="counter-summary text-stats" aria-label="글자수 계산 결과">
        <article class="counter-row text-stat-row">
          <span>공백 포함</span>
          <strong><span id="count-with-spaces">0</span> 자</strong>
          <strong><span id="bytes-with-spaces">0</span> byte</strong>
        </article>
        <article class="counter-row text-stat-row">
          <span>공백 제외</span>
          <strong><span id="count-without-spaces">0</span> 자</strong>
          <strong><span id="bytes-without-spaces">0</span> byte</strong>
        </article>
        <article class="counter-row text-stat-row text-stat-row-small">
          <span>단락 수</span>
          <strong><span id="paragraph-count">0</span> 개</strong>
        </article>
        <article class="counter-row text-stat-row text-stat-row-small">
          <span>줄 수</span>
          <strong><span id="line-count">0</span> 줄</strong>
        </article>
      </section>

      <section class="text-limit" aria-label="글자수 제한 설정">
        <label>
          <span>제한 기준</span>
          <select id="limit-type">
            <option value="none" selected>없음</option>
            <option value="withSpaces">공백 포함 글자 수</option>
            <option value="bytesWithSpaces">공백 포함 byte 수</option>
            <option value="withoutSpaces">공백 제외 글자 수</option>
            <option value="bytesWithoutSpaces">공백 제외 byte 수</option>
          </select>
        </label>
        <label>
          <span>제한 값</span>
          <input id="limit-value" type="number" min="1" inputmode="numeric" disabled>
        </label>
        <button type="button" id="apply-limit">적용</button>
      </section>

      <div class="controls text-actions">
        <button type="button" id="clear-text">전체 지우기</button>
        <button type="button" id="copy-text">텍스트 복사</button>
        <span id="copy-status" aria-live="polite"></span>
      </div>
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <nav aria-label="사이트 정보">
          <a href="../../about/">소개</a>
          <span aria-hidden="true">|</span>
          <a href="../../privacy/">개인정보처리방침</a>
          <span aria-hidden="true">|</span>
          <a href="../../terms/">이용약관</a>
          <span aria-hidden="true">|</span>
          <a href="../../contact/">문의</a>
        </nav>
        <span>© 2026 PotatoSpark. All rights reserved.</span>
      </div>
    </footer>
  </body>
</html>
