<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BMI 계산기</title>
    <link rel="stylesheet" href="../../styles.css">
    <script defer src="../../site.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-brand" href="../../">🥔⚡Potatospark</a>
        <span class="site-clock" data-site-clock aria-label="현재 날짜와 시간"></span>
      </div>
    </header>

    <main class="site-main tool">
      <h1>BMI 계산기</h1>

      <section class="form-grid bmi-input-grid" aria-label="BMI 입력">
        <label>
          키
          <span>
            <input id="height" type="number" inputmode="decimal" min="0" aria-label="키 cm">
            cm
          </span>
        </label>

        <label>
          몸무게
          <span>
            <input id="weight" type="number" inputmode="decimal" min="0" aria-label="몸무게 kg">
            kg
          </span>
        </label>
      </section>

      <section class="bmi-result" aria-label="BMI 계산 결과">
        <p>
          BMI
          <strong class="result" id="bmi-value">-</strong>
        </p>
        <p>
          분류
          <strong class="result" id="bmi-category">-</strong>
        </p>
      </section>

      <section class="bmi-scale" aria-label="BMI 분류 구간">
        <div class="bmi-scale-bar">
          <span class="bmi-scale-marker" id="bmi-marker"></span>
        </div>
        <div class="bmi-scale-labels">
          <span data-category="저체중"><strong>저체중</strong><small>18.5 미만</small></span>
          <span data-category="정상 체중"><strong>정상</strong><small>18.5-22.9</small></span>
          <span data-category="과체중"><strong>과체중</strong><small>23-24.9</small></span>
          <span data-category="비만"><strong>비만</strong><small>25-29.9</small></span>
          <span data-category="고도비만"><strong>고도비만</strong><small>30 이상</small></span>
        </div>
      </section>

      <p class="note-text">
        체질량지수(BMI, Body Mass Index)<br>
        신장, 체중을 바탕으로 상태를 객관적으로 평가하는 기준입니다.<br>
        <br>
        근육량, 지방량, 체형, 나이, 성별 차이를 반영하지는 못합니다.<br>
        결과는 참고 지표로 확인해 주세요.
      </p>
    </main>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <nav aria-label="사이트 정보">
          <a href="../../about/">소개</a>
          <span aria-hidden="true">|</span>
          <a href="../../privacy/">개인정보처리방침</a>
          <span aria-hidden="true">|</span>
          <a href="../../terms/">이용약관</a>
          <span aria-hidden="true">|</span>
          <a href="../../contact/">문의</a>
        </nav>
        <span>© 2026 PotatoSpark. All rights reserved.</span>
      </div>
    </footer>
  </body>
</html>
