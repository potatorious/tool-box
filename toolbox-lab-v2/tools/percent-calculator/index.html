<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>퍼센트 계산기</title>
    <link rel="stylesheet" href="../../styles.css">
    <script defer src="app.js"></script>
  </head>
  <body>
    <main class="tool">
      <p><a href="../../">도구 목록으로</a></p>
      <h1>퍼센트 계산기</h1>

      <div class="controls" aria-label="전체 보기 설정">
        <button type="button" id="reset-all">전체 초기화</button>
      </div>

      <section class="calc-block">
        <p class="sentence">
          <input id="part-total" type="number" inputmode="decimal" placeholder="전체 값" aria-label="기준이 되는 값">
          의
          <input id="part-percent" type="number" inputmode="decimal" placeholder="비율" aria-label="구하려는 퍼센트">
          % 는
          <strong class="result" id="part-result">-</strong>
        </p>
        <div class="formula-row">
          <code id="part-formula">100 ÷ 100 × 20 = 20</code>
        </div>
        <details class="detail">
          <summary>자세히 보기</summary>
          <div id="part-detail"></div>
        </details>
      </section>

      <section class="calc-block">
        <p class="sentence">
          <input id="reverse-part" type="number" inputmode="decimal" placeholder="일부 값" aria-label="일부 값">
          <span id="reverse-part-subject">이</span>
          <input id="reverse-percent" type="number" inputmode="decimal" placeholder="비율" aria-label="전체에서 차지하는 비율">
          % 라면
          <strong class="result" id="reverse-result">-</strong>
        </p>
        <div class="formula-row">
          <code id="reverse-formula">일부 값 ÷ 비율 × 100 = 전체 값</code>
        </div>
        <details class="detail">
          <summary>자세히 보기</summary>
          <div id="reverse-detail"></div>
        </details>
      </section>

      <section class="calc-block">
        <p class="sentence">
          <input id="ratio-total" type="number" inputmode="decimal" placeholder="전체 값" aria-label="전체 기준값">
          중
          <input id="ratio-part" type="number" inputmode="decimal" placeholder="일부 값" aria-label="일부값">
          <span id="ratio-part-topic">은</span>
          <strong class="result" id="ratio-result">-</strong>
        </p>
        <div class="formula-row">
          <code id="ratio-formula">20 ÷ 100 × 100 = 20</code>
        </div>
        <details class="detail">
          <summary>자세히 보기</summary>
          <div id="ratio-detail"></div>
        </details>
      </section>

      <section class="calc-block">
        <p class="sentence">
          <input id="change-before" type="number" inputmode="decimal" placeholder="기준 값" aria-label="처음 값">
          <span id="change-before-subject">이</span>
          <input id="change-after" type="number" inputmode="decimal" placeholder="변경 값" aria-label="바뀐 뒤의 값">
          <span id="change-after-to">으로</span> 바뀌면
          <strong class="result" id="change-result">-</strong>
        </p>
        <div class="formula-row">
          <code id="change-formula">(120 - 100) ÷ 100 × 100 = 20</code>
        </div>
        <details class="detail">
          <summary>자세히 보기</summary>
          <div id="change-detail"></div>
        </details>
      </section>

      <section class="calc-block">
        <p class="sentence">
          <input id="apply-base" type="number" inputmode="decimal" placeholder="기준 값" aria-label="원래 값">
          에
          <input id="apply-percent" type="number" inputmode="decimal" placeholder="비율" aria-label="적용할 퍼센트">
          % 를
          <button type="button" class="toggle-change percent-up" id="apply-mode" aria-label="증가 감소 전환">▲ 증가</button>
          하면
          <strong class="result" id="apply-result">-</strong>
        </p>
        <div class="formula-row">
          <code id="apply-formula">100 + (100 ÷ 100 × 20) = 120</code>
        </div>
        <details class="detail">
          <summary>자세히 보기</summary>
          <div id="apply-detail"></div>
        </details>
      </section>
    </main>
  </body>
</html>
